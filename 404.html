<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // GitHub Pages 404 handler - redirects clean URLs to .html
        (function() {
            const path = window.location.pathname;
            const base = window.location.origin;
            
            // Handle /medical route specifically
            if (path === '/medical' || path === '/medical/') {
                window.location.replace(base + '/medical.html');
                return;
            }
            
            // Generic handler: try adding .html extension
            // This makes any /page route work as /page.html
            const segments = path.split('/').filter(Boolean);
            if (segments.length > 0 && !path.endsWith('.html')) {
                const lastSegment = segments[segments.length - 1];
                // Try redirecting to .html version
                window.location.replace(base + '/' + lastSegment + '.html');
            } else {
                // If nothing works, go to home
                setTimeout(function() {
                    window.location.replace(base + '/');
                }, 3000);
            }
        })();
    </script>
    <style>
        body {
            background: #0a1628;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 2rem;
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #3b82f6;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>Taking you to the right page.</p>
        <p><a href="/">Return to Home</a></p>
    </div>
</body>
</html>
